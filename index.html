<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ведомость зелёных насаждений</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f9f9f9; }
    h2 { color: #2c3e50; }
    #search { margin: 10px 0; padding: 8px; width: 300px; font-size: 16px; }
    #table-container { max-height: 70vh; overflow-y: auto; border: 1px solid #ccc; margin-top: 10px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background: #4CAF50; color: white; position: sticky; top: 0; }
    tr { cursor: pointer; }
    tr:hover { background: #f1f1f1; }
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); }
    .modal-content { background: white; margin: 3% auto; padding: 20px; width: 90%; max-width: 500px;
      border-radius: 8px; position: relative; }
    .close { position: absolute; right: 15px; top: 10px; font-size: 28px; font-weight: bold; cursor: pointer; }
    .detail-row { margin: 5px 0; }
    .detail-row label { font-weight: bold; display: inline-block; width: 180px; }
    .photo-section { margin-top: 15px; }
    .photo-section input[type="file"] { margin: 5px 0; }
    .btn { background: #4CAF50; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    .btn:hover { opacity: 0.9; }
    #status { margin-top: 10px; }
    .removed-row { background: #ffdddd; }
  </style>
</head>
<body>
  <h2>🌳 Ведомость зелёных насаждений (Красная Пахра)</h2>
  <input type="text" id="search" placeholder="Поиск по виду, номеру, состоянию...">
  <div id="table-container">
    <table id="treeTable">
      <thead>
        <tr>
          <th>№ растения</th>
          <th>Вид</th>
          <th>Диаметр</th>
          <th>Высота</th>
          <th>Состояние</th>
          <th>Удаление</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <!-- Модальное окно -->
  <div id="treeModal" class="modal">
    <div class="modal-content">
      <span class="close" id="modalClose">&times;</span>
      <h3 id="modalTitle"></h3>
      <div id="treeDetails"></div>
      <div style="margin: 15px 0;">
        <input type="checkbox" id="removeCheck"> <label for="removeCheck">Пометить на удаление</label>
      </div>
      <div class="photo-section">
        <p><strong>Загрузить фотографии (до 4)</strong></p>
        <input type="file" accept="image/*" capture="environment" id="photo1"><br>
        <input type="file" accept="image/*" capture="environment" id="photo2"><br>
        <input type="file" accept="image/*" capture="environment" id="photo3"><br>
        <input type="file" accept="image/*" capture="environment" id="photo4"><br>
        <button class="btn" id="uploadBtn">Сохранить изменения</button>
      </div>
      <div id="status"></div>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbx26lgGuN4C804XpnuStcjrsP4-u5ej4jgjzFUNTTZGXKeWh8btdsLSLOJWnwGCfsrS2w/exec'; // ← замените на свой URL Apps Script

    let trees = [];
    let currentUid = null;

    const tableBody = document.getElementById('tableBody');
    const searchInput = document.getElementById('search');
    const modal = document.getElementById('treeModal');
    const modalClose = document.getElementById('modalClose');
    const modalTitle = document.getElementById('modalTitle');
    const treeDetails = document.getElementById('treeDetails');
    const removeCheck = document.getElementById('removeCheck');
    const uploadBtn = document.getElementById('uploadBtn');
    const statusDiv = document.getElementById('status');

    // Загрузка данных
    async function loadTrees() {
      try {
        const resp = await fetch(API_URL + '?action=list');
        trees = await resp.json();
        renderTable(trees);
      } catch (err) {
        tableBody.innerHTML = '<tr><td colspan="6">Ошибка загрузки данных</td></tr>';
        console.error(err);
      }
    }

    function renderTable(data) {
      tableBody.innerHTML = '';
      if (!Array.isArray(data) || data.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="6">Нет данных</td></tr>';
        return;
      }
      data.forEach(tree => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${tree['Номер растения'] || ''}</td>
          <td>${tree['Вид растения'] || ''}</td>
          <td>${tree['Диаметр'] || ''}</td>
          <td>${tree['Высота'] || ''}</td>
          <td>${tree['Состояние'] || ''}</td>
          <td>${tree['Remove'] === true || tree['Remove'] === 'TRUE' ? '✔️' : ''}</td>
        `;
        tr.addEventListener('click', () => openModal(tree));
        if (tree['Remove'] === true || tree['Remove'] === 'TRUE') {
          tr.classList.add('removed-row');
        }
        tableBody.appendChild(tr);
      });
    }

    // Поиск
    searchInput.addEventListener('input', () => {
      const query = searchInput.value.toLowerCase();
      const filtered = trees.filter(tree => {
        const fields = [tree['Номер растения'], tree['Вид растения'], tree['Состояние'], tree['Характеристика состояния'], tree['Рекомендации по уходу']];
        return fields.some(f => (f || '').toString().toLowerCase().includes(query));
      });
      renderTable(filtered);
    });

    // Модальное окно
    function openModal(tree) {
      currentUid = tree.UID;
      modalTitle.textContent = `${tree['Вид растения'] || 'Растение'} №${tree['Номер растения'] || ''}`;
      treeDetails.innerHTML = `
        <div class="detail-row"><label>Вид:</label> ${tree['Вид растения'] || '-'}</div>
        <div class="detail-row"><label>Форма:</label> ${tree['Жизненная форма'] || '-'}</div>
        <div class="detail-row"><label>Диаметр:</label> ${tree['Диаметр'] || '-'} см</div>
        <div class="detail-row"><label>Высота:</label> ${tree['Высота'] || '-'} м</div>
        <div class="detail-row"><label>Возраст:</label> ${tree['Возраст'] || '-'} лет</div>
        <div class="detail-row"><label>Состояние:</label> ${tree['Состояние'] || '-'}</div>
        <div class="detail-row"><label>Описание:</label> ${tree['Характеристика состояния'] || '-'}</div>
        <div class="detail-row"><label>Рекомендации:</label> ${tree['Рекомендации по уходу'] || '-'}</div>
      `;
      removeCheck.checked = (tree.Remove === true || tree.Remove === 'TRUE');
      // Очищаем поля файлов
      document.getElementById('photo1').value = '';
      document.getElementById('photo2').value = '';
      document.getElementById('photo3').value = '';
      document.getElementById('photo4').value = '';
      statusDiv.textContent = '';
      modal.style.display = 'block';
    }

    modalClose.onclick = () => modal.style.display = 'none';
    window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };

    // Сохранение
    uploadBtn.addEventListener('click', async () => {
      if (!currentUid) return;
      statusDiv.textContent = 'Сохранение...';

      // Обновление статуса удаления
      const removeBody = new URLSearchParams({
        action: 'updateRemove',
        uid: currentUid,
        remove: removeCheck.checked
      });
      await fetch(API_URL, { method: 'POST', body: removeBody });

      // Загрузка фото
      const formData = new FormData();
      formData.append('action', 'uploadPhotos');
      formData.append('uid', currentUid);
      let hasFiles = false;
      for (let i = 1; i <= 4; i++) {
        const fileInput = document.getElementById('photo' + i);
        if (fileInput.files.length > 0) {
          formData.append('photo' + (i-1), fileInput.files[0]); // нумерация с 0 для скрипта
          hasFiles = true;
        }
      }

      if (hasFiles) {
        await fetch(API_URL, { method: 'POST', body: formData });
      }

      statusDiv.textContent = 'Сохранено!';
      // Обновляем таблицу
      await loadTrees();
      setTimeout(() => { statusDiv.textContent = ''; }, 2000);
    });

    // Запуск
    loadTrees();
  </script>
</body>
</html>
