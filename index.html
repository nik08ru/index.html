<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инвентаризация зелёных насаждений</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
        #plan-container { position: relative; display: inline-block; border: 2px solid #333; line-height: 0; }
        #plan-img { max-width: 100%; height: auto; display: block; cursor: crosshair; }
        .tree-marker {
            position: absolute; width: 18px; height: 18px;
            background: rgba(0, 128, 0, 0.85); border: 2px solid white;
            border-radius: 50%; transform: translate(-50%, -50%);
            cursor: pointer; z-index: 10; transition: 0.2s;
        }
        .tree-marker:hover { background: red; width: 22px; height: 22px; }
        .tree-marker.removed { background: rgba(255, 0, 0, 0.8); }
        .calibration-point {
            position: absolute; width: 14px; height: 14px;
            background: red; border: 2px solid yellow;
            border-radius: 50%; transform: translate(-50%, -50%);
            cursor: pointer; z-index: 20;
        }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
        .modal-content { background: white; margin: 3% auto; padding: 20px;
            width: 90%; max-width: 500px; border-radius: 8px; position: relative; }
        .close { position: absolute; right: 15px; top: 10px; font-size: 28px;
            font-weight: bold; cursor: pointer; }
        .tree-info p { margin: 5px 0; }
        .tree-info label { font-weight: bold; display: inline-block; width: 180px; }
        .btn { background: #4CAF50; color: white; border: none; padding: 10px 20px;
            border-radius: 5px; cursor: pointer; margin: 5px; }
        .btn:hover { opacity: 0.9; }
        #photo-preview { max-width: 200px; max-height: 200px; margin-top: 10px; display: block; }
        #calibration-panel { margin: 15px 0; padding: 10px; background: #eef; border-radius: 5px; display: inline-block; }
        #calibration-panel label { font-weight: bold; }
        #calibration-points-list { max-height: 150px; overflow-y: auto; margin: 10px 0; }
        .point-entry { margin: 5px 0; }
    </style>
</head>
<body>
    <h2>План зелёных насаждений</h2>
    <p>Нажмите на маркер, чтобы увидеть данные, отметить удаление или загрузить фото.</p>

    <div id="calibration-panel">
        <strong>Калибровка по опорным точкам</strong>
        <p>Кликните на плане по известному растению, выберите его в списке и нажмите "Добавить точку". Добавьте 3–4 точки, затем вычислите преобразование.</p>
        <select id="treeSelect">
            <option value="">-- Выберите растение --</option>
        </select>
        <button class="btn" id="addPointBtn">Добавить точку</button>
        <button class="btn" id="computeBtn">Вычислить и применить</button>
        <button class="btn" id="saveCalibBtn" style="background:#2196F3;">Запомнить</button>
        <span id="savedMsg" style="margin-left:10px; color:green;"></span>
        <div id="calibration-points-list"></div>
        <button class="btn" id="clearPointsBtn" style="background:#f44336;">Очистить точки</button>
    </div>

    <div id="plan-container">
        <img id="plan-img" src="plan.jpg" alt="План территории">
    </div>

    <!-- Модальное окно -->
    <div id="treeModal" class="modal">
        <div class="modal-content">
            <span class="close" id="modalClose">&times;</span>
            <h3 id="treeTitle"></h3>
            <div id="treeData" class="tree-info"></div>
            <div style="margin:10px 0;">
                <input type="checkbox" id="removeCheck"> <label for="removeCheck">Пометить на удаление</label>
            </div>
            <div>
                <input type="file" id="photoInput" accept="image/*" capture="environment">
                <button class="btn" id="uploadBtn">Загрузить фото</button>
            </div>
            <img id="photo-preview" src="" alt="Фото" style="display:none;">
            <div id="statusMsg" style="margin-top:10px;"></div>
        </div>
    </div>

    <script src="trees.js"></script>
    <script>
        // ---------- НАСТРОЙКИ ----------
        const API_URL = 'ВАШ_API_URL'; // ★ замените на свой

        // ---------- ДАННЫЕ ----------
        const img = document.getElementById('plan-img');
        const container = document.getElementById('plan-container');
        const treeSelect = document.getElementById('treeSelect');
        const addPointBtn = document.getElementById('addPointBtn');
        const computeBtn = document.getElementById('computeBtn');
        const saveCalibBtn = document.getElementById('saveCalibBtn');
        const savedMsg = document.getElementById('savedMsg');
        const pointsList = document.getElementById('calibration-points-list');
        const clearPointsBtn = document.getElementById('clearPointsBtn');

        let calibrationPoints = []; // { x_pix, y_pix, x_raw, y_raw }
        let transformMatrix = null; // коэффициенты a,b,c,d,e,f для x' = a*x + b*y + c, y' = d*x + e*y + f

        // Заполняем выпадающий список деревьями
        function populateSelect() {
            treesRaw.forEach(t => {
                const option = document.createElement('option');
                option.value = t.uid;
                option.textContent = `ID ${t.id} (${t.x_raw.toFixed(1)}, ${t.y_raw.toFixed(1)})`;
                treeSelect.appendChild(option);
            });
        }

        // Отрисовка списка опорных точек
        function renderPointsList() {
            let html = '';
            calibrationPoints.forEach((p, i) => {
                const tree = treesRaw.find(t => t.uid == p.uid);
                const name = tree ? `ID ${tree.id}` : '?';
                html += `<div class="point-entry">${i+1}. Пикс: (${Math.round(p.x_pix)}, ${Math.round(p.y_pix)}) → ${name} (${p.x_raw.toFixed(1)}, ${p.y_raw.toFixed(1)}) 
                    <button data-index="${i}" class="btn" style="background:orange; padding:2px 8px;">×</button></div>`;
            });
            pointsList.innerHTML = html;
            document.querySelectorAll('.point-entry button').forEach(btn => {
                btn.addEventListener('click', function() {
                    const idx = parseInt(this.dataset.index);
                    calibrationPoints.splice(idx, 1);
                    renderPointsList();
                    drawCalibrationPoints();
                });
            });
        }

        // Добавление новой опорной точки
        function addCalibrationPoint(uid, x_pix, y_pix) {
            const tree = treesRaw.find(t => t.uid == uid);
            if (!tree) return alert('Выберите растение из списка!');
            // Проверяем, нет ли уже этой точки
            if (calibrationPoints.some(p => p.uid == uid)) {
                alert('Это растение уже добавлено.');
                return;
            }
            calibrationPoints.push({ uid, x_pix, y_pix, x_raw: tree.x_raw, y_raw: tree.y_raw });
            renderPointsList();
            drawCalibrationPoints();
        }

        // Отображение красных кружков опорных точек на плане
        function drawCalibrationPoints() {
            container.querySelectorAll('.calibration-point').forEach(el => el.remove());
            calibrationPoints.forEach(p => {
                const dot = document.createElement('div');
                dot.className = 'calibration-point';
                dot.style.left = p.x_pix + 'px';
                dot.style.top = p.y_pix + 'px';
                container.appendChild(dot);
            });
        }

        // Решение системы линейных уравнений методом Гаусса (матрица n x (n+1))
        function gauss(A) {
            const n = A.length;
            for (let i=0; i<n; i++) {
                // Поиск максимума в столбце
                let maxEl = Math.abs(A[i][i]), maxRow = i;
                for (let k=i+1; k<n; k++) {
                    if (Math.abs(A[k][i]) > maxEl) {
                        maxEl = Math.abs(A[k][i]);
                        maxRow = k;
                    }
                }
                // Перестановка строк
                [A[i], A[maxRow]] = [A[maxRow], A[i]];
                // Нормализация
                const div = A[i][i];
                for (let j=i; j<=n; j++) A[i][j] /= div;
                // Вычитание из остальных строк
                for (let k=0; k<n; k++) {
                    if (k === i) continue;
                    const factor = A[k][i];
                    for (let j=i; j<=n; j++) A[k][j] -= factor * A[i][j];
                }
            }
            return A.map(row => row[n]);
        }

        // Вычисление аффинного преобразования по 3+ точкам (метод наименьших квадратов через псевдообратную матрицу)
        function computeAffineTransform(points) {
            // points: массив {x_raw, y_raw, x_pix, y_pix}
            // Ищем матрицу 2x3: [a, b, c; d, e, f]
            // Система: x_pix = a*x_raw + b*y_raw + c
            //          y_pix = d*x_raw + e*y_raw + f
            // Составляем матрицу M (2N x 6) и вектор RHS (2N)
            const N = points.length;
            let M = [], rhs = [];
            for (let p of points) {
                // первое уравнение
                M.push([p.x_raw, p.y_raw, 1, 0, 0, 0]);
                rhs.push(p.x_pix);
                // второе уравнение
                M.push([0, 0, 0, p.x_raw, p.y_raw, 1]);
                rhs.push(p.y_pix);
            }
            // Решаем M^T * M * x = M^T * rhs
            let MtM = Array(6).fill().map(() => Array(6).fill(0));
            let Mtrhs = Array(6).fill(0);
            for (let i = 0; i < 2*N; i++) {
                for (let j = 0; j < 6; j++) {
                    Mtrhs[j] += M[i][j] * rhs[i];
                    for (let k = 0; k < 6; k++) {
                        MtM[j][k] += M[i][j] * M[i][k];
                    }
                }
            }
            // Расширенная матрица 6x7
            let aug = [];
            for (let i=0; i<6; i++) {
                aug.push([...MtM[i], Mtrhs[i]]);
            }
            const sol = gauss(aug);
            return { a: sol[0], b: sol[1], c: sol[2], d: sol[3], e: sol[4], f: sol[5] };
        }

        // Применяем преобразование ко всем маркерам
        function placeMarkersWithTransform(T) {
            if (!treesRaw || treesRaw.length === 0) return;
            const imgW = img.clientWidth;
            const imgH = img.clientHeight;
            if (imgW === 0 || imgH === 0) return;

            container.querySelectorAll('.tree-marker').forEach(el => el.remove());

            treesRaw.forEach(t => {
                const px = T.a * t.x_raw + T.b * t.y_raw + T.c;
                const py = T.d * t.x_raw + T.e * t.y_raw + T.f;

                // Ограничиваем, чтобы не вылезало за границы контейнера
                if (px < 0 || px > imgW || py < 0 || py > imgH) return;

                const dot = document.createElement('div');
                dot.className = 'tree-marker';
                dot.style.left = px + 'px';
                dot.style.top = py + 'px';
                dot.dataset.uid = t.uid;
                dot.addEventListener('click', () => openModal(t.uid));
                container.appendChild(dot);
            });
        }

        // Обработчики
        addPointBtn.addEventListener('click', () => {
            const uid = parseInt(treeSelect.value);
            if (!uid) return alert('Выберите растение из списка.');
            // Ждём клика по плану
            alert('Теперь кликните по этому растению на плане.');
            const handler = function(e) {
                const rect = img.getBoundingClientRect();
                const scaleX = img.clientWidth / rect.width;
                const scaleY = img.clientHeight / rect.height;
                const x_pix = (e.clientX - rect.left) * scaleX;
                const y_pix = (e.clientY - rect.top) * scaleY;
                addCalibrationPoint(uid, x_pix, y_pix);
                img.removeEventListener('click', handler);
            };
            img.addEventListener('click', handler);
        });

        computeBtn.addEventListener('click', () => {
            if (calibrationPoints.length < 3) {
                return alert('Нужно минимум 3 опорные точки.');
            }
            const T = computeAffineTransform(calibrationPoints);
            transformMatrix = T;
            placeMarkersWithTransform(T);
            // Очищаем опорные точки (опционально)
            calibrationPoints = [];
            renderPointsList();
            container.querySelectorAll('.calibration-point').forEach(el => el.remove());
            localStorage.setItem('treeTransform', JSON.stringify(T));
        });

        saveCalibBtn.addEventListener('click', () => {
            if (transformMatrix) {
                localStorage.setItem('treeTransform', JSON.stringify(transformMatrix));
                savedMsg.textContent = 'Преобразование сохранено!';
                setTimeout(() => savedMsg.textContent = '', 2000);
            } else {
                alert('Сначала вычислите преобразование.');
            }
        });

        clearPointsBtn.addEventListener('click', () => {
            calibrationPoints = [];
            renderPointsList();
            container.querySelectorAll('.calibration-point').forEach(el => el.remove());
        });

        // Попытка загрузить сохранённое преобразование
        try {
            const savedT = localStorage.getItem('treeTransform');
            if (savedT) {
                transformMatrix = JSON.parse(savedT);
                img.addEventListener('load', () => placeMarkersWithTransform(transformMatrix));
                if (img.complete) placeMarkersWithTransform(transformMatrix);
            } else {
                // первичная расстановка без калибровки
                img.addEventListener('load', placeMarkersSimple);
                if (img.complete) placeMarkersSimple();
            }
        } catch(e) {}

        function placeMarkersSimple() {
            // простой вариант (как раньше) если нет сохранённого преобразования
            if (!treesRaw || treesRaw.length === 0) return;
            const imgW = img.clientWidth;
            const imgH = img.clientHeight;
            if (imgW === 0 || imgH === 0) return;
            container.querySelectorAll('.tree-marker').forEach(el => el.remove());
            let xMin = Infinity, xMax = -Infinity, yMin = Infinity, yMax = -Infinity;
            treesRaw.forEach(t => {
                if (t.x_raw < xMin) xMin = t.x_raw;
                if (t.x_raw > xMax) xMax = t.x_raw;
                if (t.y_raw < yMin) yMin = t.y_raw;
                if (t.y_raw > yMax) yMax = t.y_raw;
            });
            const dx = xMax - xMin;
            const dy = yMax - yMin;
            treesRaw.forEach(t => {
                const nx = (t.x_raw - xMin) / dx;
                const ny = (t.y_raw - yMin) / dy;
                const px = nx * imgW;
                const py = ny * imgH;
                const dot = document.createElement('div');
                dot.className = 'tree-marker';
                dot.style.left = px + 'px';
                dot.style.top = py + 'px';
                dot.dataset.uid = t.uid;
                dot.addEventListener('click', () => openModal(t.uid));
                container.appendChild(dot);
            });
        }

        // ---------- ИНИЦИАЛИЗАЦИЯ ----------
        populateSelect();

        // Остальной код модального окна, обработки Remove и фото – без изменений
        const modal = document.getElementById('treeModal');
        const modalClose = document.getElementById('modalClose');
        const treeTitle = document.getElementById('treeTitle');
        const treeDataDiv = document.getElementById('treeData');
        const removeCheck = document.getElementById('removeCheck');
        const photoInput = document.getElementById('photoInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const photoPreview = document.getElementById('photo-preview');
        const statusMsg = document.getElementById('statusMsg');

        let currentUid = null;

        async function openModal(uid) {
            currentUid = uid;
            statusMsg.textContent = '';
            removeCheck.checked = false;
            photoPreview.style.display = 'none';
            treeDataDiv.innerHTML = 'Загрузка...';
            modal.style.display = 'block';
            try {
                const resp = await fetch(API_URL + '?uid=' + uid);
                const data = await resp.json();
                if (data.error) {
                    treeDataDiv.innerHTML = '<p style="color:red;">' + data.error + '</p>';
                    return;
                }
                const fields = [
                    ['Номер растения', 'Номер растения'],
                    ['Вид растения', 'Вид растения'],
                    ['Жизненная форма', 'Жизненная форма'],
                    ['Тип насаждения', 'Тип насаждения'],
                    ['Диаметр', 'Диаметр'],
                    ['Высота', 'Высота'],
                    ['Возраст', 'Возраст'],
                    ['Состояние', 'Состояние'],
                    ['Характеристика состояния', 'Характеристика состояния'],
                    ['Рекомендации по уходу', 'Рекомендации по уходу'],
                    ['Особо ценное', 'Особо ценное']
                ];
                let html = '';
                fields.forEach(([key, label]) => {
                    if (data[key] !== undefined && data[key] !== '') {
                        html += '<p><label>' + label + ':</label> ' + data[key] + '</p>';
                    }
                });
                treeTitle.textContent = (data['Вид растения'] || 'Растение') + ' (ID ' + (data['ID'] || '') + ')';
                treeDataDiv.innerHTML = html;
                removeCheck.checked = (data['Remove'] === true || data['Remove'] === 'TRUE');
                if (data['PhotoURL']) {
                    photoPreview.src = data['PhotoURL'];
                    photoPreview.style.display = 'block';
                }
            } catch (err) {
                treeDataDiv.innerHTML = '<p style="color:red;">Ошибка связи</p>';
            }
        }

        removeCheck.addEventListener('change', async () => {
            if (!currentUid) return;
            const body = new URLSearchParams({ action: 'updateRemove', uid: currentUid, remove: removeCheck.checked });
            const resp = await fetch(API_URL, { method: 'POST', body });
            const result = await resp.json();
            statusMsg.textContent = result.success ? 'Статус обновлён' : 'Ошибка: ' + result.error;
            const dot = document.querySelector('.tree-marker[data-uid="' + currentUid + '"]');
            if (dot) dot.classList.toggle('removed', removeCheck.checked);
        });

        uploadBtn.addEventListener('click', async () => {
            if (!currentUid) return;
            const file = photoInput.files[0];
            if (!file) { statusMsg.textContent = 'Выберите файл'; return; }
            statusMsg.textContent = 'Загрузка...';
            const formData = new FormData();
            formData.append('action', 'uploadPhoto');
            formData.append('uid', currentUid);
            formData.append('photo', file);
            const resp = await fetch(API_URL, { method: 'POST', body: formData });
            const result = await resp.json();
            if (result.success) {
                photoPreview.src = result.photoUrl;
                photoPreview.style.display = 'block';
                statusMsg.textContent = 'Фото загружено';
                photoInput.value = '';
            } else {
                statusMsg.textContent = 'Ошибка: ' + result.error;
            }
        });

        modalClose.onclick = () => modal.style.display = 'none';
        window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };
    </script>
</body>
</html>
